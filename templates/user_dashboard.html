<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/user_dashboard.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Welcome, {{ user.username }} 👋</h1>

        <div class="profile">

            <div class="row">

                <label>Full Name</label>

                <p>{{ user.fullname }}</p>

            </div>

            <div class="row">

                <label>Username</label>

                <p>{{ user.username }}</p>

            </div>

            <div class="row">

                <label>Email</label>

                <p>{{ user.email }}</p>

            </div>

            <div class="row">

                <label>Bio</label>

                <p>{{ user.bio }}</p>

            </div>

        </div>

        <div class="buttons">

            <a href="/profile_update/{{ user.id }}"><button>Edit Profile</button></a>

            <a href="/user_logout">
                <button class="logout">
                    Logout
                </button>
            </a>

        </div>

    </div>

</div>

</body>
</html>
