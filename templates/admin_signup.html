<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_signup.css') }}">
</head>
<body>

    <div class="signup-container">

        <div class="signup-card">

            <h2>Admin Sign Up</h2>

            <form action="/admin_signup" method="POST" onsubmit=" return validateForm(event)">

                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="Enter your full name" required>

                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>

                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>

                <label>Password</label>
                
                <div class="password-box">
                     <input
                 type="password"
                 id="password" 
                 name="password" 
                 placeholder="Create a password" 
                 oninput="validatePassword()" 
                 required
                 >
                    <button
                        type="button"
                        class="eye-btn"
                        onclick="togglePassword()">
                        👁
                    </button>

                </div>

                <span class="valid_password" id="passwordMessage">
                    
                </span>

                <label>Confirm Password</label>
                <input type="password" 
                id="confirm_password"
                name="confirm_password" 
                placeholder="Confirm your password" 
                oninput="confirmPassword()"
                required>

                <span id="check_password" class="valid_password"></span>


                <button type="submit">Create Admin Account</button>

            </form>

            <p class="login-link">
                Already have an account?
                <a href="/admin_login">Login</a>
            </p>

        </div>

    </div>
    <script src="{{ url_for('static', filename='js/create_account.js') }}"></script>
</body>
</html>
